<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake the Cake! 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hk-pink: #FFB7C5;
            --hk-light-pink: #FFE5EC;
            --hk-dark-pink: #FB6F92;
            --hk-white: #FFFFFF;
            --hk-yellow: #FFD166;
        }
        body {
            background-color: var(--hk-light-pink);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--hk-white);
            border: 8px solid var(--hk-pink);
            border-radius: 20px;
            padding: 30px 20px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--hk-dark-pink);
            font-size: 1.6rem;
            margin-bottom: 10px;
        }
        p { color: #666; margin-bottom: 20px; font-size: 0.95rem; }
        
        /* Interactive ingredients grid */
        .ingredients {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .ingredient {
            background: var(--hk-light-pink);
            border: 2px dashed var(--hk-dark-pink);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.2s, background-color 0.2s;
        }
        .ingredient.selected {
            background: var(--hk-pink);
            border-style: solid;
            transform: scale(0.9);
        }

        /* Cake Display */
        .cake-area {
            height: 120px;
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        .cake {
            width: 120px;
            height: 70px;
            background: var(--hk-pink);
            border-radius: 10px 10px 0 0;
            border-bottom: 6px solid var(--hk-dark-pink);
            display: none;
            position: relative;
        }
        .cake::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 15px;
            background: var(--hk-light-pink);
            border-radius: 10px;
            top: 10px;
            left: 0;
        }
        .candle {
            width: 12px;
            height: 35px;
            background: repeating-linear-gradient(45deg, var(--hk-white), var(--hk-white) 5px, var(--hk-dark-pink) 5px, var(--hk-dark-pink) 10px);
            position: absolute;
            bottom: 70px;
            left: calc(50% - 6px);
            display: none;
        }
        .flame {
            width: 12px;
            height: 20px;
            background: var(--hk-yellow);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px var(--hk-yellow);
            position: absolute;
            bottom: 105px;
            left: calc(50% - 6px);
            animation: flicker 0.6s infinite alternate;
            cursor: pointer;
            display: none;
        }
        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        .btn {
            background: var(--hk-dark-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">Let's Bake! 🍓</h1>
        <p id="prompt">Tap all 3 ingredients to add them to the bowl!</p>
        
        <div class="ingredients" id="ingredients-box">
            <div class="ingredient" onclick="selectIng(this, 'strawberries')">🍓<br><span style="font-size:0.7rem">Berries</span></div>
            <div class="ingredient" onclick="selectIng(this, 'sugar')">🍬<br><span style="font-size:0.7rem">Sugar</span></div>
            <div class="ingredient" onclick="selectIng(this, 'love')">💖<br><span style="font-size:0.7rem">Love</span></div>
        </div>

        <div class="cake-area">
            <div class="flame" id="flame" onclick="blowCandle()"></div>
            <div class="candle" id="candle"></div>
            <div class="cake" id="cake"></div>
        </div>

        <a href="gift.html" class="btn" id="next-btn">Open Your Gift! 🎁</a>
    </div>

    <script>
        let selectedCount = 0;
        function selectIng(element, type) {
            if (!element.classList.contains('selected')) {
                element.classList.add('selected');
                selectedCount++;
                if (selectedCount === 3) {
                    setTimeout(bakeCake, 800);
                }
            }
        }

        function bakeCake() {
            document.getElementById('ingredients-box').style.display = 'none';
            document.getElementById('title').innerText = "Make a Wish! 🕯️";
            document.getElementById('prompt').innerText = "Blow out the candle (tap the flame!)";
            
            document.getElementById('cake').style.display = 'block';
            document.getElementById('candle').style.display = 'block';
            document.getElementById('flame').style.display = 'block';
        }

        function blowCandle() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('prompt').innerText = "Your wish was sent directly to my heart! ♥";
            document.getElementById('next-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
