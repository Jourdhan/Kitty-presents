<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake the Cake! 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hk-pink: #FFB7C5;
            --hk-light-pink: #FFE5EC;
            --hk-dark-pink: #FB6F92;
            --hk-white: #FFFFFF;
            --hk-yellow: #FFD166;
        }
        body {
            background-color: var(--hk-light-pink);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--hk-white);
            border: 8px solid var(--hk-pink);
            border-radius: 20px;
            padding: 30px 20px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            position: relative;
        }
        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--hk-dark-pink);
            font-size: 1.6rem;
            margin-bottom: 10px;
        }
        p { color: #666; margin-bottom: 20px; font-size: 0.95rem; }
        
        /* Interactive ingredients grid */
        .ingredients {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .ingredient {
            background: var(--hk-light-pink);
            border: 2px dashed var(--hk-dark-pink);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.2s, background-color 0.2s;
            position: relative;
        }
        .ingredient.selected {
            background: var(--hk-pink);
            border-style: solid;
            transform: scale(0.9);
            opacity: 0.6;
            pointer-events: none;
        }

        /* Cake Display Area */
        .cake-area {
            height: 140px;
            position: relative;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            border-bottom: 4px dashed var(--hk-light-pink);
            padding-bottom: 10px;
        }
        .cake {
            width: 130px;
            height: 75px;
            background: var(--hk-pink);
            border-radius: 12px 12px 0 0;
            border-bottom: 6px solid var(--hk-dark-pink);
            position: relative;
            z-index: 2;
        }
        .cake::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 15px;
            background: var(--hk-light-pink);
            border-radius: 10px;
            top: 12px;
            left: 0;
        }
        .candle {
            width: 12px;
            height: 35px;
            background: repeating-linear-gradient(45deg, var(--hk-white), var(--hk-white) 5px, var(--hk-dark-pink) 5px, var(--hk-dark-pink) 10px);
            position: absolute;
            bottom: 75px;
            left: calc(50% - 6px);
            display: none;
            z-index: 3;
        }
        .flame {
            width: 12px;
            height: 20px;
            background: var(--hk-yellow);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px var(--hk-yellow);
            position: absolute;
            bottom: 110px;
            left: calc(50% - 6px);
            animation: flicker 0.6s infinite alternate;
            cursor: pointer;
            display: none;
            z-index: 4;
        }
        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* Flying & Dropped Ingredients Styling */
        .flying-item {
            position: absolute;
            font-size: 1.8rem;
            z-index: 10;
            pointer-events: none;
            animation: fallIntoCake 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes fallIntoCake {
            0% {
                transform: translate(var(--start-x), var(--start-y)) scale(1.2);
                opacity: 1;
            }
            80% {
                transform: translate(var(--end-x), calc(var(--end-y) - 10px)) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--end-x), var(--end-y)) scale(0.9);
                opacity: 0.9;
            }
        }

        /* Static placed item on the cake mix */
        .placed-item {
            position: absolute;
            font-size: 1.2rem;
            z-index: 5;
            bottom: 15px;
        }

        .btn {
            background: var(--hk-dark-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            display: none;
            box-shadow: 0 4px 10px rgba(251, 111, 146, 0.3);
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <h1 id="title">Let's Bake, but you're drunk! 🍓</h1>
        <p id="prompt">Tap all 3 ingredients to add them very badly to the cake!</p>
        
        <div class="ingredients" id="ingredients-box">
            <div class="ingredient" onclick="addIngredient(this, '🍓')">🍓<br><span style="font-size:0.7rem">Berries</span></div>
            <div class="ingredient" onclick="selectIng(this)">🍬<br><span style="font-size:0.7rem">Sugar</span></div>
            <div class="ingredient" onclick="addIngredient(this, '💖')">💖<br><span style="font-size:0.7rem">Love</span></div>
        </div>

        <!-- The baking container area -->
        <div class="cake-area" id="cake-area">
            <div class="flame" id="flame" onclick="blowCandle()"></div>
            <div class="candle" id="candle"></div>
            <div class="cake" id="cake" style="display: block; opacity: 0.3;"></div>
        </div>

        <a href="gift.html" class="btn" id="next-btn">Open Your Gift! 🎁</a>
    </div>

    <script>
        let selectedCount = 0;

        // Custom function for alternative sugar trigger
        function selectIng(el) {
            addIngredient(el, '🍬');
        }

        function addIngredient(element, emoji) {
            if (element.classList.contains('selected')) return;
            element.classList.add('selected');
            
            const container = document.getElementById('main-container');
            const cakeArea = document.getElementById('cake-area');
            
            // Get coordinates to map the path from the button to the cake
            const startRect = element.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            // Calculate relative X and Y positions inside our container box
            const startX = (startRect.left + startRect.width / 2) - containerRect.left;
            const startY = (startRect.top + startRect.height / 2) - containerRect.top;
            
            // Land point: spread out slightly across the cake width
            const offsetSpread = (selectedCount * 25) - 25; 
            const endX = (containerRect.width / 2) + offsetSpread;
            const endY = containerRect.height - 110; 

            // Create temporary animated flying emoji
            const flyer = document.createElement('div');
            flyer.className = 'flying-item';
            flyer.innerText = emoji;
            flyer.style.setProperty('--start-x', `${startX}px`);
            flyer.style.setProperty('--start-y', `${startY}px`);
            flyer.style.setProperty('--end-x', `${endX}px`);
            flyer.style.setProperty('--end-y', `${endY}px`);
            
            container.appendChild(flyer);

            // Once the flight animation finishes, place it permanently in the bowl
            setTimeout(() => {
                flyer.remove();
                
                const placed = document.createElement('div');
                placed.className = 'placed-item';
                placed.innerText = emoji;
                placed.style.left = `${endX - 10}px`;
                // Vary depth slightly
                placed.style.bottom = `${20 + (selectedCount * 8)}px`; 
                cakeArea.appendChild(placed);
            }, 800);

            selectedCount++;
            if (selectedCount === 3) {
                setTimeout(bakeCake, 1500);
            }
        }

        function bakeCake() {
            // Remove the ingredients selector interface
            document.getElementById('ingredients-box').style.display = 'none';
            
            // Clear out the raw visible ingredients inside the bowl mixture
            const items = document.querySelectorAll('.placed-item');
            items.forEach(el => el.remove());
            
            // Perfect the baked cake visual
            document.getElementById('title').innerText = "Make a Wish! 🕯️";
            document.getElementById('prompt').innerText = "Blow out the candle (tap the flame!)";
            
            const cake = document.getElementById('cake');
            cake.style.opacity = "1"; 
            document.getElementById('candle').style.display = 'block';
            document.getElementById('flame').style.display = 'block';
        }

        function blowCandle() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('prompt').innerText = "Your wish was sent directly to my heart! ♥";
            document.getElementById('next-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
